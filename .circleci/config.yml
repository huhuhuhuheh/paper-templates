version: 2.1

jobs:
  build-and-release:
    docker:
      - image: cimg/base:current
    steps:
      - checkout

      - run:
          name: Determine Versions
          command: |
            VER=$(echo $CIRCLE_TAG | sed 's/^v//')
            JAVA_VER=8
            if [[ $(echo -e "$VER\n26.1" | sort -V | head -n1) == "26.1" ]]; then
              JAVA_VER=25
            elif [[ $(echo -e "$VER\n1.20.5" | sort -V | head -n1) == "1.20.5" ]]; then
              JAVA_VER=21
            elif [[ $(echo -e "$VER\n1.18" | sort -V | head -n1) == "1.18" ]]; then
              JAVA_VER=17
            elif [[ $(echo -e "$VER\n1.17" | sort -V | head -n1) == "1.17" ]]; then
              JAVA_VER=16
            fi
            echo "export JAVA_VERSION=$JAVA_VER" >> $BASH_ENV
            echo "export MC_VERSION=$VER" >> $BASH_ENV

      - run:
          name: Update Build Files
          command: |
            sed -i "s/val targetJavaVersion = [0-9]*/val targetJavaVersion = ${JAVA_VERSION}/" Kotlin/build.gradle.kts
            sed -i "s/def targetJavaVersion = [0-9]*/def targetJavaVersion = ${JAVA_VERSION}/" Java/build.gradle
            if [ "$JAVA_VERSION" = "25" ]; then
              sed -i 's/kotlin("jvm") version "[^"]*"/kotlin("jvm") version "2.3.20"/' Kotlin/build.gradle.kts || true
            fi

      - run:
          name: Setup Java
          command: |
            URL="https://api.adoptium.net/v3/binary/latest/${JAVA_VERSION}/ga/linux/x64/jdk/hotspot/normal/eclipse"
            wget -qO jdk.tar.gz "$URL"
            sudo mkdir -p /opt/jdk
            sudo tar -xzf jdk.tar.gz -C /opt/jdk --strip-components=1
            echo 'export JAVA_HOME="/opt/jdk"' >> $BASH_ENV
            echo 'export PATH="/opt/jdk/bin:$PATH"' >> $BASH_ENV

      - run:
          name: Update Gradle Wrapper
          command: |
            if [ "$JAVA_VERSION" = "25" ]; then
              cd Kotlin
              chmod +x gradlew
              ./gradlew wrapper --gradle-version=9.1.0 --distribution-type=bin || echo "WRAPPER_UPDATE_FAILED=1" >> $BASH_ENV
              cd ../Java
              chmod +x gradlew
              ./gradlew wrapper --gradle-version=9.1.0 --distribution-type=bin || echo "WRAPPER_UPDATE_FAILED=1" >> $BASH_ENV
            fi

      - run:
          name: Test Kotlin Build
          command: |
            cd Kotlin
            chmod +x gradlew
            ./gradlew build --no-daemon -Dorg.gradle.java.home=/opt/jdk --stacktrace || echo "KOTLIN_BUILD_FAILED=1" >> $BASH_ENV

      - run:
          name: Test Java Build
          command: |
            cd Java
            chmod +x gradlew
            ./gradlew build --no-daemon -Dorg.gradle.java.home=/opt/jdk --stacktrace || echo "JAVA_BUILD_FAILED=1" >> $BASH_ENV

      - run:
          name: Handle GitHub Issue
          when: always
          command: |
            if ! command -v gh &> /dev/null; then
              curl -sSL https://github.com/cli/cli/releases/download/v2.46.0/gh_2.46.0_linux_amd64.tar.gz | tar xz --strip-components=1 -C /tmp
              sudo mv /tmp/bin/gh /usr/local/bin/
            fi
            if [ "$KOTLIN_BUILD_FAILED" = "1" ] || [ "$JAVA_BUILD_FAILED" = "1" ] || [ "$WRAPPER_UPDATE_FAILED" = "1" ]; then
              TITLE="Build failure for Paper Template ${MC_VERSION} (tag ${CIRCLE_TAG})"
              BODY="Build failed."
              EXISTING=$(gh issue list --state open --search "${TITLE}" --json number -q '.[0].number' || echo "")
              if [ -n "$EXISTING" ]; then
                gh issue comment "$EXISTING" --body "Build failed again."
              else
                gh issue create --title "$TITLE" --body "$BODY" --assignee huhuhuhuheh
              fi
            else
              TITLE="Build failure for Paper Template ${MC_VERSION} (tag ${CIRCLE_TAG})"
              EXISTING=$(gh issue list --state open --search "${TITLE}" --json number -q '.[0].number' || echo "")
              if [ -n "$EXISTING" ]; then
                gh issue close "$EXISTING" --reason completed
              fi
            fi

workflows:
  version: 2
  release:
    jobs:
      - build-and-release:
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v?[0-9].*$/
