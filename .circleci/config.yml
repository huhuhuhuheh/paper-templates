version: 2.1

jobs:
  build-and-release:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - run:
          name: Determine Versions
          command: |
            VER=$(echo $CIRCLE_TAG | sed 's/^v//')
            JAVA_VER=8
            if [[ $(echo -e "$VER\n26.1" | sort -V | head -n1) == "26.1" ]]; then
              JAVA_VER=25
            elif [[ $(echo -e "$VER\n1.20.5" | sort -V | head -n1) == "1.20.5" ]]; then
              JAVA_VER=21
            elif [[ $(echo -e "$VER\n1.18" | sort -V | head -n1) == "1.18" ]]; then
              JAVA_VER=17
            elif [[ $(echo -e "$VER\n1.17" | sort -V | head -n1) == "1.17" ]]; then
              JAVA_VER=16
            fi
            echo "DEBUG: CIRCLE_TAG=$CIRCLE_TAG"
            echo "DEBUG: Initial MC_VERSION=$VER"
            echo "DEBUG: JAVA_VERSION=$JAVA_VER"
            UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:149.0) Gecko/20100101 Firefox/149.0"
            echo "DEBUG: Checking PaperMC API for version $VER"
            if curl -s -H "User-Agent: $UA" "https://fill.papermc.io/v3/projects/paper/versions/${VER}" | grep -q '"version"'; then
              echo "DEBUG: Version $VER confirmed on PaperMC."
            else
              echo "DEBUG: Version $VER not found on PaperMC API. Fetching latest available version..."
              LATEST=$(curl -s -H "User-Agent: $UA" "https://fill.papermc.io/v3/projects/paper" | grep -o '"[0-9][0-9.]*"' | tr -d '"' | sort -V | tail -1)
              echo "DEBUG: Latest PaperMC version: $LATEST"
              VER=$LATEST
            fi
            echo "DEBUG: Final MC_VERSION=$VER"
            echo "export JAVA_VERSION=$JAVA_VER" >> $BASH_ENV
            echo "export MC_VERSION=$VER" >> $BASH_ENV
      - run:
          name: Update Build Files
          command: |
            sed -i "s/val targetJavaVersion = [0-9]*/val targetJavaVersion = ${JAVA_VERSION}/" Kotlin/build.gradle.kts
            echo "Updated: Kotlin/build.gradle.kts"
            sed -i "s/paper-api:[0-9.]*-R0.1-SNAPSHOT/paper-api:${MC_VERSION}-R0.1-SNAPSHOT/" Kotlin/build.gradle.kts
            echo "Updated: Kotlin/build.gradle.kts (paper-api)"
            sed -i "s/minecraftVersion(\"[0-9.]*\")/minecraftVersion(\"${MC_VERSION}\")/" Kotlin/build.gradle.kts
            echo "Updated: Kotlin/build.gradle.kts (minecraftVersion)"
            sed -i "s/def targetJavaVersion = [0-9]*/def targetJavaVersion = ${JAVA_VERSION}/" Java/build.gradle
            echo "Updated: Java/build.gradle"
            sed -i "s/paper-api:[0-9.]*-R0.1-SNAPSHOT/paper-api:${MC_VERSION}-R0.1-SNAPSHOT/" Java/build.gradle
            echo "Updated: Java/build.gradle (paper-api)"
            sed -i "s/minecraftVersion(\"[0-9.]*\")/minecraftVersion(\"${MC_VERSION}\")/" Java/build.gradle
            echo "Updated: Java/build.gradle (minecraftVersion)"
            if [ "$JAVA_VERSION" = "25" ]; then
              sed -i 's/kotlin("jvm") version "[^"]*"/kotlin("jvm") version "2.3.20"/' Kotlin/build.gradle.kts || true
              echo "Updated: Kotlin/build.gradle.kts (kotlin plugin to 2.3.20 because JAVA_VERSION=25)"
            else
              echo "Skipped: Kotlin plugin version (JAVA_VERSION is not 25)"
            fi
            echo "DEBUG: Build files updated with MC_VERSION=${MC_VERSION} JAVA_VERSION=${JAVA_VERSION}"
      - run:
          name: Setup Java
          command: |
            if [ "$JAVA_VERSION" = "16" ]; then
              URL="https://github.com/adoptium/temurin16-binaries/releases/download/jdk-16.0.2%2B7/OpenJDK16U-jdk_x64_linux_hotspot_16.0.2_7.tar.gz"
            else
              URL="https://api.adoptium.net/v3/binary/latest/${JAVA_VERSION}/ga/linux/x64/jdk/hotspot/normal/eclipse"
            fi
            echo "DEBUG: JDK URL = $URL"
            wget --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:149.0) Gecko/20100101 Firefox/149.0" -qO jdk.tar.gz "$URL"
            echo "DEBUG: Download finished (exit code $?)"
            sudo mkdir -p /opt/jdk
            sudo tar -xzf jdk.tar.gz -C /opt/jdk --strip-components=1
            echo "DEBUG: Extraction finished (exit code $?)"
            echo 'export JAVA_HOME="/opt/jdk"' >> $BASH_ENV
            echo 'export PATH="/opt/jdk/bin:$PATH"' >> $BASH_ENV
            echo "DEBUG: JAVA_HOME and PATH exported"
            echo "DEBUG: Java version installed:"
            /opt/jdk/bin/java -version 2>&1 | head -n 3
      - run:
          name: Test Kotlin Build
          command: |
            cd Kotlin
            chmod +x gradlew
            echo "DEBUG: Java version right before Kotlin build:"
            /opt/jdk/bin/java -version
            ./gradlew build --no-daemon -Dorg.gradle.java.home=/opt/jdk --stacktrace 2>&1 | tee kotlin-build.log
            if [ ${PIPESTATUS[0]} -ne 0 ]; then
              echo "KOTLIN_BUILD_FAILED=1" >> $BASH_ENV
            fi
      - run:
          name: Test Java Build
          command: |
            cd Java
            chmod +x gradlew
            echo "DEBUG: Java version right before Java build:"
            /opt/jdk/bin/java -version
            ./gradlew build --no-daemon -Dorg.gradle.java.home=/opt/jdk --stacktrace 2>&1 | tee java-build.log
            if [ ${PIPESTATUS[0]} -ne 0 ]; then
              echo "JAVA_BUILD_FAILED=1" >> $BASH_ENV
            fi
      - run:
          name: Handle GitHub Issue
          when: always
          command: |
            if [ "$KOTLIN_BUILD_FAILED" = "1" ] || [ "$JAVA_BUILD_FAILED" = "1" ]; then
              echo "DEBUG: Build failed - creating/updating GitHub issue"
              TITLE="Build failure for Paper Template ${MC_VERSION} (tag ${CIRCLE_TAG})"
              BODY="**Game Version:** ${MC_VERSION}\n**Java Version:** ${JAVA_VERSION}\n\nGradle build failed.\n\n### Kotlin build log (last 50 lines)\n\`\`\`\n$(tail -50 kotlin-build.log 2>/dev/null || echo 'No log available')\n\`\`\`\n\n### Java build log (last 50 lines)\n\`\`\`\n$(tail -50 java-build.log 2>/dev/null || echo 'No log available')\n\`\`\`\n\nFull logs in CircleCI job."
              EXISTING=$(gh issue list --state open --search "${TITLE}" --json number -q '.[0].number' || echo "")
              if [ -n "$EXISTING" ]; then
                gh issue comment "$EXISTING" --body "Build failed again with same error."
              else
                gh issue create --title "$TITLE" --body "$BODY" --assignee huhuhuhuheh
              fi
            else
              echo "DEBUG: Build succeeded - closing any open issue"
              TITLE="Build failure for Paper Template ${MC_VERSION} (tag ${CIRCLE_TAG})"
              EXISTING=$(gh issue list --state open --search "${TITLE}" --json number -q '.[0].number' || echo "")
              if [ -n "$EXISTING" ]; then
                gh issue comment "$EXISTING" --body "✅ Build now succeeds for ${MC_VERSION} (Java ${JAVA_VERSION}). Closing issue."
                gh issue close "$EXISTING" --reason completed
              fi
            fi
      - run:
          name: Zip Templates
          command: |
            cd Java
            zip -r ../paper-${MC_VERSION}-Java.zip . -x "build/*" ".gradle/*"
            cd ../Kotlin
            zip -r ../paper-${MC_VERSION}-Kotlin.zip . -x "build/*" ".gradle/*"
      - run:
          name: Update Release Assets
          command: |
            echo "## Paper Template (${MC_VERSION})" > release_notes.txt
            echo "- **Game Version:** ${MC_VERSION}" >> release_notes.txt
            echo "- **Java Version:** ${JAVA_VERSION}" >> release_notes.txt
            echo "" >> release_notes.txt
            echo "🔗 [Minecraft Wiki](https://minecraft.wiki/w/Java_Edition_${MC_VERSION})" >> release_notes.txt
            
            if ! command -v gh &> /dev/null; then
              echo "DEBUG: Installing gh CLI"
              curl -sSL -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:149.0) Gecko/20100101 Firefox/149.0" https://github.com/cli/cli/releases/download/v2.46.0/gh_2.46.0_linux_amd64.tar.gz | tar xz --strip-components=1 -C /tmp
              sudo mv /tmp/bin/gh /usr/local/bin/
            fi
            if gh release view "$CIRCLE_TAG" &> /dev/null; then
              gh release edit "$CIRCLE_TAG" --notes-file release_notes.txt
              gh release upload "$CIRCLE_TAG" paper-${MC_VERSION}-Java.zip paper-${MC_VERSION}-Kotlin.zip --clobber
            else
              gh release create "$CIRCLE_TAG" paper-${MC_VERSION}-Java.zip paper-${MC_VERSION}-Kotlin.zip --title "Paper Template (${MC_VERSION})" --notes-file release_notes.txt
            fi

workflows:
  version: 2
  release:
    jobs:
      - build-and-release:
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v?[0-9].*$/
