version: 2.1

jobs:
  build-and-release:
    docker:
      - image: cimg/base:current
    steps:
      - checkout

      - run:
          name: Determine Versions
          command: |
            echo "Determining Minecraft and Java versions..."
            VER=$(echo $CIRCLE_TAG | sed 's/^v//')
            JAVA_VER=8
            if [[ $(echo -e "$VER\n26.1" | sort -V | head -n1) == "26.1" ]]; then
              JAVA_VER=25
            elif [[ $(echo -e "$VER\n1.20.5" | sort -V | head -n1) == "1.20.5" ]]; then
              JAVA_VER=21
            elif [[ $(echo -e "$VER\n1.18" | sort -V | head -n1) == "1.18" ]]; then
              JAVA_VER=17
            elif [[ $(echo -e "$VER\n1.17" | sort -V | head -n1) == "1.17" ]]; then
              JAVA_VER=16
            fi
            echo "DEBUG: CIRCLE_TAG=$CIRCLE_TAG"
            echo "DEBUG: Initial MC_VERSION=$VER"
            echo "DEBUG: JAVA_VERSION=$JAVA_VER"
            echo "export JAVA_VERSION=$JAVA_VER" >> $BASH_ENV
            echo "export MC_VERSION=$VER" >> $BASH_ENV

      - run:
          name: Update Build Files
          command: |
            echo "Updating build.gradle files with correct versions..."
            sed -i "s/val targetJavaVersion = [0-9]*/val targetJavaVersion = ${JAVA_VERSION}/" Kotlin/build.gradle.kts
            sed -i "s/def targetJavaVersion = [0-9]*/def targetJavaVersion = ${JAVA_VERSION}/" Java/build.gradle
            sed -i "s/paper-api:[0-9.]*-R0.1-SNAPSHOT/paper-api:${MC_VERSION}-R0.1-SNAPSHOT/" Kotlin/build.gradle.kts
            sed -i "s/paper-api:[0-9.]*-R0.1-SNAPSHOT/paper-api:${MC_VERSION}-R0.1-SNAPSHOT/" Java/build.gradle
            sed -i "s/minecraftVersion(\"[0-9.]*\")/minecraftVersion(\"${MC_VERSION}\")/" Kotlin/build.gradle.kts
            sed -i "s/minecraftVersion(\"[0-9.]*\")/minecraftVersion(\"${MC_VERSION}\")/" Java/build.gradle
            if[ "$JAVA_VERSION" = "25" ]; then
              sed -i 's/kotlin("jvm") version "[^"]*"/kotlin("jvm") version "2.3.20"/' Kotlin/build.gradle.kts || true
            fi
            echo "Build files updated."

      - run:
          name: Setup Bootstrap Java
          command: |
            BOOTSTRAP_JAVA=22
            if[ "$JAVA_VERSION" != "25" ]; then
              BOOTSTRAP_JAVA="$JAVA_VERSION"
            fi
            if [ "$BOOTSTRAP_JAVA" = "16" ]; then
              URL="https://github.com/adoptium/temurin16-binaries/releases/download/jdk-16.0.2%2B7/OpenJDK16U-jdk_x64_linux_hotspot_16.0.2_7.tar.gz"
            else
              URL="https://api.adoptium.net/v3/binary/latest/${BOOTSTRAP_JAVA}/ga/linux/x64/jdk/hotspot/normal/eclipse"
            fi
            echo "Downloading Bootstrap JDK $BOOTSTRAP_JAVA from $URL..."
            wget --user-agent="Mozilla/5.0" -qO bootstrap-jdk.tar.gz "$URL"
            echo "Extracting Bootstrap JDK..."
            sudo mkdir -p /opt/bootstrap-jdk
            sudo tar -xzf bootstrap-jdk.tar.gz -C /opt/bootstrap-jdk --strip-components=1
            echo 'export BOOTSTRAP_JAVA_HOME="/opt/bootstrap-jdk"' >> $BASH_ENV
            echo "Bootstrap JDK setup complete."

      - run:
          name: Update Gradle Wrapper
          command: |
            if [ "$JAVA_VERSION" = "25" ]; then
              echo "Java version is 25, starting Gradle Wrapper update to 9.1.0..."
              
              echo "Updating Kotlin project wrapper..."
              cd Kotlin
              chmod +x gradlew
              JAVA_HOME=/opt/bootstrap-jdk PATH=/opt/bootstrap-jdk/bin:$PATH ./gradlew wrapper --gradle-version=9.1.0 --distribution-type=bin 2>&1 | tee ../kotlin-wrapper-update.log
              if [ ${PIPESTATUS[0]} -ne 0 ]; then
                echo "WRAPPER_UPDATE_FAILED=1" >> $BASH_ENV
                echo "FAILURE_STAGE=Kotlin wrapper update" >> $BASH_ENV
                echo "Kotlin wrapper update failed."
              fi
              JAVA_HOME=/opt/bootstrap-jdk PATH=/opt/bootstrap-jdk/bin:$PATH ./gradlew wrapper --gradle-version=9.1.0 --distribution-type=bin 2>&1 | tee -a ../kotlin-wrapper-update.log
              
              echo "Updating Java project wrapper..."
              cd ../Java
              chmod +x gradlew
              JAVA_HOME=/opt/bootstrap-jdk PATH=/opt/bootstrap-jdk/bin:$PATH ./gradlew wrapper --gradle-version=9.1.0 --distribution-type=bin 2>&1 | tee ../java-wrapper-update.log
              if [ ${PIPESTATUS[0]} -ne 0 ]; then
                echo "WRAPPER_UPDATE_FAILED=1" >> $BASH_ENV
                echo "FAILURE_STAGE=Java wrapper update" >> $BASH_ENV
                echo "Java wrapper update failed."
              fi
              JAVA_HOME=/opt/bootstrap-jdk PATH=/opt/bootstrap-jdk/bin:$PATH ./gradlew wrapper --gradle-version=9.1.0 --distribution-type=bin 2>&1 | tee -a ../java-wrapper-update.log
              
              echo "Gradle wrapper updates complete."
            else
              echo "Java version is not 25. Skipping Gradle Wrapper update."
            fi

      - run:
          name: Setup Target Java
          command: |
            if [ "$JAVA_VERSION" = "16" ]; then
              URL="https://github.com/adoptium/temurin16-binaries/releases/download/jdk-16.0.2%2B7/OpenJDK16U-jdk_x64_linux_hotspot_16.0.2_7.tar.gz"
            else
              URL="https://api.adoptium.net/v3/binary/latest/${JAVA_VERSION}/ga/linux/x64/jdk/hotspot/normal/eclipse"
            fi
            echo "Downloading Target JDK $JAVA_VERSION from $URL..."
            wget --user-agent="Mozilla/5.0" -qO target-jdk.tar.gz "$URL"
            echo "Extracting Target JDK..."
            sudo mkdir -p /opt/jdk
            sudo tar -xzf target-jdk.tar.gz -C /opt/jdk --strip-components=1
            echo 'export JAVA_HOME="/opt/jdk"' >> $BASH_ENV
            echo 'export PATH="/opt/jdk/bin:$PATH"' >> $BASH_ENV
            echo "Verifying Java Installation:"
            /opt/jdk/bin/java -version 2>&1 | head -n 3

      - run:
          name: Test Kotlin Build
          command: |
            echo "Entering Kotlin directory..."
            cd Kotlin
            chmod +x gradlew
            echo "Running Kotlin gradlew --version..."
            ./gradlew --version 2>&1 | tee ../kotlin-gradlew-debug.log
            
            echo "Starting Kotlin Gradle build (this may take a moment)..."
            if ./gradlew build --no-daemon -Dorg.gradle.java.home=/opt/jdk --stacktrace 2>&1 | tee ../kotlin-build.log; then
              echo "KOTLIN_BUILD_FAILED=0" >> $BASH_ENV
              echo "Kotlin build succeeded."
            else
              echo "KOTLIN_BUILD_FAILED=1" >> $BASH_ENV
              echo "FAILURE_STAGE=Kotlin build" >> $BASH_ENV
              echo "Kotlin build failed."
            fi

      - run:
          name: Test Java Build
          command: |
            echo "Entering Java directory..."
            cd Java
            chmod +x gradlew
            echo "Running Java gradlew --version..."
            ./gradlew --version 2>&1 | tee ../java-gradlew-debug.log
            
            echo "Starting Java Gradle build (this may take a moment)..."
            if ./gradlew build --no-daemon -Dorg.gradle.java.home=/opt/jdk --stacktrace 2>&1 | tee ../java-build.log; then
              echo "JAVA_BUILD_FAILED=0" >> $BASH_ENV
              echo "Java build succeeded."
            else
              echo "JAVA_BUILD_FAILED=1" >> $BASH_ENV
              echo "FAILURE_STAGE=Java build" >> $BASH_ENV
              echo "Java build failed."
            fi

      - run:
          name: Handle GitHub Issue
          when: always
          command: |
            echo "Setting up GitHub CLI..."
            if ! command -v gh &> /dev/null; then
              curl -sSL -H "User-Agent: Mozilla/5.0" https://github.com/cli/cli/releases/download/v2.46.0/gh_2.46.0_linux_amd64.tar.gz | tar xz --strip-components=1 -C /tmp
              sudo mv /tmp/bin/gh /usr/local/bin/
            fi

            FAILURE_STAGE="${FAILURE_STAGE:-Unknown}"
            KOTLIN_BUILD_FAILED="${KOTLIN_BUILD_FAILED:-0}"
            JAVA_BUILD_FAILED="${JAVA_BUILD_FAILED:-0}"
            WRAPPER_UPDATE_FAILED="${WRAPPER_UPDATE_FAILED:-0}"

            if [ "$KOTLIN_BUILD_FAILED" = "1" ] || [ "$JAVA_BUILD_FAILED" = "1" ] ||[ "$WRAPPER_UPDATE_FAILED" = "1" ]; then
              echo "Failures detected, preparing to create or update GitHub issue..."
              TITLE="Build failure for Paper Template ${MC_VERSION} (tag ${CIRCLE_TAG})"

              WRAPPER_LOG=""
              if [ "$FAILURE_STAGE" = "Kotlin wrapper update" ]; then
                WRAPPER_LOG="$(cat kotlin-wrapper-update.log 2>/dev/null || echo 'No Kotlin wrapper-update log')"
              elif [ "$FAILURE_STAGE" = "Java wrapper update" ]; then
                WRAPPER_LOG="$(cat java-wrapper-update.log 2>/dev/null || echo 'No Java wrapper-update log')"
              else
                WRAPPER_LOG="No wrapper-update log"
              fi

              {
                echo "**Failure stage:** ${FAILURE_STAGE}"
                echo ""
                echo "**Gradle & JVM info:**"
                echo '```'
                echo "Kotlin gradlew debug:"
                cat kotlin-gradlew-debug.log 2>/dev/null || echo 'No Kotlin gradlew debug'
                echo ""
                echo "Java gradlew debug:"
                cat java-gradlew-debug.log 2>/dev/null || echo 'No Java gradlew debug'
                echo '```'
                echo ""
                echo "**Wrapper update log:**"
                echo '```'
                echo "${WRAPPER_LOG}"
                echo '```'
                echo ""
                echo "**Kotlin build log:**"
                echo '```'
                tail -50 kotlin-build.log 2>/dev/null || echo 'No Kotlin log'
                echo '```'
                echo ""
                echo "**Java build log:**"
                echo '```'
                tail -50 java-build.log 2>/dev/null || echo 'No Java log'
                echo '```'
                echo ""
                echo "Full logs are available in CircleCI."
              } > issue_body.txt
              
              BODY=$(cat issue_body.txt)

              EXISTING=$(gh issue list --state open --search "${TITLE}" --json number -q '.[0].number' || echo "")
              if[ -n "$EXISTING" ]; then
                echo "Updating existing issue #${EXISTING}..."
                gh issue comment "$EXISTING" --body "$BODY"
              else
                echo "Creating new issue..."
                gh issue create --title "$TITLE" --body "$BODY" --assignee huhuhuhuheh
              fi
            else
              echo "Build passed successfully, closing any open issues related to this version..."
              TITLE="Build failure for Paper Template ${MC_VERSION} (tag ${CIRCLE_TAG})"
              EXISTING=$(gh issue list --state open --search "${TITLE}" --json number -q '.[0].number' || echo "")
              if[ -n "$EXISTING" ]; then
                echo "Closing issue #${EXISTING}..."
                gh issue close "$EXISTING" --reason completed
              fi
            fi

      - run:
          name: Zip Templates
          command: |
            echo "Zipping Java template..."
            cd Java
            zip -r ../paper-${MC_VERSION}-Java.zip . -x "build/*" ".gradle/*"
            echo "Zipping Kotlin template..."
            cd ../Kotlin
            zip -r ../paper-${MC_VERSION}-Kotlin.zip . -x "build/*" ".gradle/*"
            echo "Zipping complete."

      - run:
          name: Update Release Assets
          command: |
            echo "Preparing release notes..."
            echo "## Paper Template (${MC_VERSION})" > release_notes.txt
            echo "- **Game Version:** ${MC_VERSION}" >> release_notes.txt
            echo "- **Java Version:** ${JAVA_VERSION}" >> release_notes.txt
            echo "" >> release_notes.txt
            echo "🔗 [Minecraft Wiki](https://minecraft.wiki/w/Java_Edition_${MC_VERSION})" >> release_notes.txt

            echo "Ensuring GitHub CLI is available..."
            if ! command -v gh &> /dev/null; then
              curl -sSL -H "User-Agent: Mozilla/5.0" https://github.com/cli/cli/releases/download/v2.46.0/gh_2.46.0_linux_amd64.tar.gz | tar xz --strip-components=1 -C /tmp
              sudo mv /tmp/bin/gh /usr/local/bin/
            fi

            if gh release view "$CIRCLE_TAG" &> /dev/null; then
              echo "Release for $CIRCLE_TAG found. Updating release and uploading assets..."
              gh release edit "$CIRCLE_TAG" --notes-file release_notes.txt
              gh release upload "$CIRCLE_TAG" paper-${MC_VERSION}-Java.zip paper-${MC_VERSION}-Kotlin.zip --clobber
            else
              echo "Release for $CIRCLE_TAG not found. Creating release and uploading assets..."
              gh release create "$CIRCLE_TAG" paper-${MC_VERSION}-Java.zip paper-${MC_VERSION}-Kotlin.zip --title "Paper Template (${MC_VERSION})" --notes-file release_notes.txt
            fi
            echo "Release update complete."

workflows:
  version: 2
  release:
    jobs:
      - build-and-release:
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v?[0-9].*$/